server:
  port: 9900

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oncall?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update

ai:
  service:
    url: http://127.0.0.1:8000

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md,pdf,doc,docx,csv

